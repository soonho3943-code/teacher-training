<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교직원 연수 자료</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4f9;
      min-height: 100vh;
    }

    /* ── 헤더 배너 ── */
    .hero {
      background: linear-gradient(135deg, #1a3a6b 0%, #2563b0 60%, #3b82d4 100%);
      padding: 44px 20px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .hero-badge {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.9);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .hero-title {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .hero-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      font-weight: 400;
    }

    /* ── 목록 영역 ── */
    #list-view { max-width: 720px; margin: 0 auto; }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 20px 12px;
    }

    .list-count {
      font-size: 13px;
      color: #7a8a9e;
      font-weight: 500;
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1.5px solid #dde5f0;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      color: #2563b0;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }

    .refresh-btn:hover { background: #eef4ff; border-color: #93b8e8; }

    .refresh-icon { font-size: 15px; }

    #dept-list { padding: 0 16px 48px; }

    /* ── 카드 ── */
    .dept-card {
      background: #fff;
      border-radius: 16px;
      padding: 0;
      margin-bottom: 10px;
      display: flex;
      align-items: stretch;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    .dept-card:hover {
      box-shadow: 0 4px 20px rgba(37,99,176,0.15);
      transform: translateY(-1px);
    }

    .dept-card:active {
      transform: scale(0.985);
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    .card-accent {
      width: 5px;
      background: linear-gradient(180deg, #2563b0, #3b82d4);
      flex-shrink: 0;
      border-radius: 16px 0 0 16px;
    }

    .card-body {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 18px 20px;
      gap: 16px;
    }

    .dept-num {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #eef4ff;
      color: #2563b0;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .dept-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow: hidden;
    }

    .dept-name {
      font-size: 17px;
      font-weight: 600;
      color: #1a2e4a;
      letter-spacing: -0.3px;
    }

    .dept-filename {
      display: block;
      font-size: 13px;
      color: #7a8a9e;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .open-btn {
      background: linear-gradient(135deg, #2563b0, #3b82d4);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(37,99,176,0.3);
      flex-shrink: 0;
    }

    .open-btn:hover { opacity: 0.88; }
    .open-btn:active { transform: scale(0.95); }

    /* ── 다중 파일 카드 ── */
    .dept-card.multi {
      cursor: default;
      flex-direction: column;
      align-items: stretch;
      padding: 0;
    }

    .dept-card.multi:hover {
      transform: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    }

    .dept-card.multi .card-accent {
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, #2563b0, #3b82d4);
      border-radius: 16px 16px 0 0;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px 12px;
    }

    .file-count-badge {
      background: #eef4ff;
      color: #2563b0;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .file-list {
      border-top: 1px solid #f0f4f9;
      padding: 6px 16px 14px 20px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      margin-bottom: 3px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .file-item:last-child { margin-bottom: 0; }

    .file-item:hover { background: #f0f6ff; }
    .file-item:active { background: #dbeafe; }

    .file-tree-icon {
      color: #93b8e8;
      font-size: 16px;
      flex-shrink: 0;
      line-height: 1;
    }

    .file-item-name {
      flex: 1;
      font-size: 15px;
      color: #334155;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-item-name.loading {
      color: #aab8c8;
      font-style: italic;
    }

    .file-open-btn {
      background: #eef4ff;
      color: #2563b0;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .file-open-btn:hover { background: #dbeafe; }

    /* ── 상태 메시지 ── */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      font-size: 15px;
      color: #9aabb8;
      line-height: 1.8;
    }

    .state-icon { font-size: 40px; margin-bottom: 12px; }
    .state-msg.error { color: #c0392b; }

    /* ── 로딩 스피너 ── */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #dde5f0;
      border-top-color: #2563b0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PDF 뷰어 ── */
    #pdf-view {
      display: none;
      position: fixed;
      inset: 0;
      background: #111;
      z-index: 200;
      flex-direction: column;
    }

    #pdf-header {
      background: linear-gradient(90deg, #12264a, #1a3a6b);
      color: #fff;
      padding: 13px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    #back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: background 0.15s;
    }

    #back-btn:hover { background: rgba(255,255,255,0.2); }

    .pdf-header-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }

    #pdf-title {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -0.3px;
    }

    #pdf-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #1a1a1a;
    }
  </style>
</head>
<body>

<!-- ──────────────── 목록 화면 ──────────────── -->
<div id="list-view">
  <div class="hero">
    <div class="hero-badge">교직원 연수</div>
    <h1 class="hero-title">연수 자료 목록</h1>
    <p class="hero-sub">부서명을 선택하면 연수 자료가 열립니다</p>
  </div>

  <div class="list-header">
    <span class="list-count" id="list-count"></span>
    <button class="refresh-btn" onclick="loadData()">
      <span class="refresh-icon">↺</span> 새로고침
    </button>
  </div>

  <div id="dept-list">
    <div class="state-msg">
      <div class="spinner"></div>
      자료를 불러오는 중...
    </div>
  </div>
</div>

<!-- ──────────────── PDF 뷰어 화면 ──────────────── -->
<div id="pdf-view">
  <div id="pdf-header">
    <button id="back-btn" onclick="closePdf()">&#8592; 목록으로</button>
    <span class="pdf-header-dot"></span>
    <span id="pdf-title"></span>
  </div>
  <iframe id="pdf-frame" src="" allowfullscreen></iframe>
</div>

<script>
  // ★ Google Sheets ID
  const SHEETS_ID = '1ZyqX4mubFnJNsyIsNLv3p2YCpq78VcsK4bpFyGvvX9g';

  // ★ Google Apps Script 웹 앱 URL (파일명 조회용) — 설정 방법은 아래 주석 참고
  // script.google.com → 새 프로젝트 → 코드 붙여넣기 → 배포 → 웹앱 URL 여기에 입력
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxh7iKeiBzvPHHJ92m4cvNGaXAaGu0CMKAv_b0a_hVK6DkhC2pKi-1270RDMz_c_3Pg/exec';

  // Google Form 열 순서 (Timestamp=0, 부서명=1, 파일=2)
  const COL_NAME = 1;
  const COL_FILE = 2;

  function extractDriveId(url) {
    if (!url) return null;
    let m;
    m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (m) return m[1];
    m = url.match(/id=([a-zA-Z0-9_-]+)/);
    if (m) return m[1];
    return null;
  }

  function stripExtension(name) {
    return name.replace(/\.[^/.]+$/, '');
  }

  async function fetchFileNames(ids) {
    if (!GAS_URL) return ids.map((_, i) => `자료 ${i + 1}`);
    try {
      const res = await fetch(`${GAS_URL}?ids=${ids.join(',')}`);
      const names = await res.json();
      return names.map((n, i) => n ? stripExtension(n) : `자료 ${i + 1}`);
    } catch {
      return ids.map((_, i) => `자료 ${i + 1}`);
    }
  }

  function attachFileItemListeners(card, fileIds, deptName) {
    card.querySelectorAll('.file-item').forEach((item, i) => {
      item.addEventListener('click', (e) => {
        e.stopPropagation();
        const label = item.querySelector('.file-item-name').textContent;
        openPdf(`${deptName} — ${label}`, fileIds[i]);
      });
    });
  }

  function buildMultiCard(num, name, fileIds, fileNames) {
    const items = fileIds.map((_, i) => `
      <div class="file-item">
        <span class="file-tree-icon">└</span>
        <span class="file-item-name">${fileNames[i]}</span>
        <button class="file-open-btn">열기</button>
      </div>
    `).join('');

    return `
      <div class="card-accent"></div>
      <div class="card-header">
        <span class="dept-num">${num}</span>
        <span class="dept-name">${name}</span>
        <span class="file-count-badge">파일 ${fileIds.length}개</span>
      </div>
      <div class="file-list">${items}</div>
    `;
  }

  function loadData() {
    const list = document.getElementById('dept-list');
    const countEl = document.getElementById('list-count');
    countEl.textContent = '';
    list.innerHTML = '<div class="state-msg"><div class="spinner"></div>자료를 불러오는 중...</div>';

    const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:json`;

    fetch(url)
      .then(res => { if (!res.ok) throw new Error('network'); return res.text(); })
      .then(text => {
        const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/)[1];
        const rows = JSON.parse(jsonStr).table.rows;

        if (!rows || rows.length === 0) {
          list.innerHTML = '<div class="state-msg"><div class="state-icon">📭</div>아직 등록된 자료가 없습니다.<br>선생님들이 파일을 업로드하면 여기에 표시됩니다.</div>';
          return;
        }

        list.innerHTML = '';
        let count = 0;

        rows.forEach((row) => {
          const name = row.c[COL_NAME]?.v?.toString().trim() || '';
          const fileRaw = row.c[COL_FILE]?.v?.toString().trim() || '';
          const fileIds = fileRaw.split(',').map(u => extractDriveId(u.trim())).filter(Boolean);

          if (!name || fileIds.length === 0) return;
          count++;
          const num = count;

          const card = document.createElement('div');

          if (fileIds.length === 1) {
            // ── 단일 파일 ──
            card.className = 'dept-card';
            card.innerHTML = `
              <div class="card-accent"></div>
              <div class="card-body">
                <span class="dept-num">${num}</span>
                <div class="dept-info">
                  <span class="dept-name">${name}</span>
                  <span class="dept-filename loading">불러오는 중...</span>
                </div>
                <button class="open-btn">열기</button>
              </div>
            `;
            card.addEventListener('click', () => openPdf(name, fileIds[0]));
            fetchFileNames(fileIds).then(names => {
              const el = card.querySelector('.dept-filename');
              if (el) { el.textContent = names[0]; el.classList.remove('loading'); }
            });
          } else {
            // ── 다중 파일: 트리 스타일 ──
            card.className = 'dept-card multi';
            const placeholders = fileIds.map((_, i) => `자료 ${i + 1}`);
            card.innerHTML = buildMultiCard(num, name, fileIds, placeholders);
            attachFileItemListeners(card, fileIds, name);

            // 파일명 비동기 조회 후 업데이트
            fetchFileNames(fileIds).then(names => {
              card.innerHTML = buildMultiCard(num, name, fileIds, names);
              attachFileItemListeners(card, fileIds, name);
            });
          }

          list.appendChild(card);
        });

        if (count === 0) {
          list.innerHTML = '<div class="state-msg"><div class="state-icon">⚠️</div>유효한 자료가 없습니다.<br>파일이 올바르게 업로드되었는지 확인해주세요.</div>';
        } else {
          countEl.textContent = `총 ${count}개 부서`;
        }
      })
      .catch(() => {
        list.innerHTML = `<div class="state-msg error">
          <div class="state-icon">❌</div>
          자료를 불러올 수 없습니다.<br><br>
          ① SHEETS_ID가 올바른지 확인<br>
          ② Google Sheets 공유 설정 확인<br>
          ③ 새로고침 버튼을 눌러주세요
        </div>`;
      });
  }

  function openPdf(title, fileId) {
    document.getElementById('pdf-title').textContent = title;
    document.getElementById('pdf-frame').src = `https://drive.google.com/file/d/${fileId}/preview`;
    document.getElementById('pdf-view').style.display = 'flex';
  }

  function closePdf() {
    document.getElementById('pdf-view').style.display = 'none';
    document.getElementById('pdf-frame').src = '';
  }

  loadData();
</script>
</body>
</html>
